services:
  redis:
    image: redis:7-alpine
    container_name: nest-learn-redis
    ports:
      - '${REDIS_PORT}:6379'
  postgres:
    image: postgres:16-alpine
    container_name: nest_learn_postgres
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
